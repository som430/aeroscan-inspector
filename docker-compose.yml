services:
  api:
    build:
      context: .
      dockerfile: AeroScan.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  blazor:
    build:
      context: .
      dockerfile: AeroScan.Blazor/Dockerfile
    ports:
      - "8081:80"
    depends_on:
      - api
